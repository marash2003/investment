<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Money | InvestCore</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --bg: #030303; --panel: #0a0a0a; --gold: #c5a059;
            --border: rgba(255, 255, 255, 0.05); --text-dim: #666;
            --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; min-height: 100vh; font-size: 13px; }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar { width: var(--sidebar-w); background: #000; border-right: 1px solid var(--border); padding: 30px; position: fixed; height: 100vh; z-index: 100; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px; color: var(--text-dim); text-decoration: none; transition: 0.3s; border-radius: 4px; }
        .nav-item:hover, .nav-item.active { color: var(--gold); background: rgba(197, 160, 89, 0.08); }

        /* --- MOBILE BOTTOM NAV --- */
        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid var(--border); padding: 12px 0; z-index: 1000; justify-content: space-around; }
        .mobile-nav a { color: var(--text-dim); text-decoration: none; font-size: 22px; }
        .mobile-nav a.active { color: var(--gold); }

        /* --- MAIN AREA --- */
        .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 60px; width: 100%; max-width: 1000px; margin-right: auto; }
        .page-header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .page-header h1 { font-weight: 200; font-size: 2.2rem; letter-spacing: -1px; }

        .section-label { font-size: 10px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; display: block; }

        /* --- WITHDRAW CARD --- */
        .withdraw-card { background: var(--panel); border: 1px solid var(--border); padding: 40px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Balance Box */
        .balance-box { background: #000; border: 1px solid var(--border); padding: 25px; margin-bottom: 30px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .balance-box p { color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
        .balance-box h2 { font-size: 2rem; color: #fff; font-weight: 300; }

        .input-group { margin-bottom: 30px; }
        .input-group label { display: block; font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
        
        input, select { 
            width: 100%; background: #000; border: 1px solid var(--border); padding: 16px; 
            color: #fff; font-size: 14px; outline: none; border-radius: 4px; transition: 0.3s; 
        }
        input:focus { border-color: var(--gold); }

        /* --- PAYMENT BUTTONS (Grid) --- */
        .gateway-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .gate-btn { 
            background: #000; border: 1px solid var(--border); padding: 20px 10px; text-align: center; 
            cursor: pointer; transition: 0.3s; border-radius: 4px;
        }
        .gate-btn:hover { border-color: rgba(197, 160, 89, 0.5); }
        .gate-btn.active { border-color: var(--gold); background: rgba(197, 160, 89, 0.05); }
        .gate-btn i { font-size: 1.8rem; display: block; margin-bottom: 8px; color: var(--text-dim); transition: 0.3s; }
        .gate-btn.active i { color: var(--gold); }
        .gate-btn span { font-size: 10px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }

        /* --- DYNAMIC DATA BOXES --- */
        .dynamic-form { 
            background: #050505; border: 1px dashed var(--border); padding: 25px; 
            border-radius: 4px; margin-bottom: 30px; display: none; 
            animation: slideIn 0.4s ease forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        .btn-submit { 
            width: 100%; background: var(--gold); color: #000; padding: 20px; 
            border: none; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; cursor: pointer; border-radius: 4px; transition: 0.3s;
        }
        .btn-submit:hover { background: #d4b475; letter-spacing: 3px; }

        /* --- RESPONSIVE SETTINGS --- */
        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .main-content { margin-left: 0; padding: 30px 20px 100px 20px; }
        }

        @media (max-width: 600px) {
            .gateway-grid { grid-template-columns: repeat(2, 1fr); }
            .balance-box { flex-direction: column; align-items: flex-start; gap: 10px; }
        }

        @media (max-width: 480px) {
            .form-row { grid-template-columns: 1fr; }
            .gateway-grid { grid-template-columns: 1fr; }
            .withdraw-card { padding: 25px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="margin-bottom: 50px; color: var(--gold); letter-spacing: 5px; font-size: 10px; text-align: center;">INVESTCORE</div>
        <nav>
            <a href="dashboard.html" class="nav-item"><i class="ph ph-chart-line-up"></i> Dashboard</a>
            <a href="deposit.html" class="nav-item"><i class="ph ph-wallet"></i> Fund Wallet</a>
            <a href="withdraw.html" class="nav-item active"><i class="ph ph-arrow-circle-up-right"></i> Withdraw Money</a>
        </nav>
    </aside>

    <nav class="mobile-nav">
        <a href="dashboard.html"><i class="ph ph-chart-line-up"></i></a>
        <a href="deposit.html"><i class="ph ph-wallet"></i></a>
        <a href="withdraw.html" class="active"><i class="ph ph-arrow-circle-up-right"></i></a>
    </nav>

    <main class="main-content">
        <header class="page-header" data-aos="fade-down">
            <h1>Cash <b>Out</b></h1>
            <p style="color:var(--text-dim)">Withdraw your funds to your preferred account.</p>
        </header>

        <div class="withdraw-card" data-aos="fade-up">
            
            <div class="balance-box">
                <div>
                    <p>Current Balance</p>
                    <h2>$4,520.00</h2>
                </div>
                <i class="ph ph-shield-check" style="font-size: 2rem; color: var(--gold);"></i>
            </div>

            <div class="input-group">
                <label>1. How much do you want to take out?</label>
                <input type="number" id="withdraw-amt" placeholder="Enter amount (USD)">
            </div>

            <label class="section-label">2. Select a payout method</label>
            <div class="gateway-grid">
                <div class="gate-btn active" onclick="setGate('paypal', this)" title="Withdraw using your PayPal email">
                    <i class="ph ph-paypal-logo"></i><span>PayPal</span>
                </div>
                <div class="gate-btn" onclick="setGate('momo', this)" title="Withdraw to your Mobile Money number">
                    <i class="ph ph-device-mobile"></i><span>Mobile Money</span>
                </div>
                <div class="gate-btn" onclick="setGate('crypto', this)" title="Withdraw to your Crypto wallet address">
                    <i class="ph ph-currency-btc"></i><span>Crypto</span>
                </div>
                <div class="gate-btn" onclick="setGate('wire', this)" title="Withdraw directly to your Bank Account">
                    <i class="ph ph-bank"></i><span>Bank Wire</span>
                </div>
                <div class="gate-btn" onclick="setGate('card', this)" title="Send funds back to your Debit/Credit card">
                    <i class="ph ph-credit-card"></i><span>Card</span>
                </div>
                <div class="gate-btn" onclick="setGate('gpay', this)" title="Withdraw using Google Pay">
                    <i class="ph ph-google-logo"></i><span>G-Pay</span>
                </div>
            </div>

            <div id="form-paypal" class="dynamic-form" style="display:block;">
                <label>PayPal Email Address</label>
                <input type="email" placeholder="email@example.com">
            </div>

            <div id="form-momo" class="dynamic-form">
                <label>Service Provider</label>
                <select style="margin-bottom:15px;">
                    <option>MTN Mobile Money</option>
                    <option>Orange Money</option>
                    <option>M-Pesa</option>
                </select>
                <div class="form-row">
                    <div><label>Phone Number</label><input type="text" placeholder="+237..."></div>
                    <div><label>Account Name</label><input type="text" placeholder="Full Name"></div>
                </div>
            </div>

            <div id="form-crypto" class="dynamic-form">
                <label>Select Coin</label>
                <select style="margin-bottom:15px;">
                    <option>Bitcoin (BTC)</option>
                    <option>USDT (TRC-20)</option>
                    <option>Ethereum (ERC-20)</option>
                </select>
                <label>Your Receiving Wallet Address</label>
                <input type="text" placeholder="Paste your wallet address here">
            </div>

            <div id="form-wire" class="dynamic-form">
                <label>Bank Name</label>
                <input type="text" placeholder="e.g. Chase Bank" style="margin-bottom:15px;">
                <div class="form-row">
                    <div><label>Swift/BIC Code</label><input type="text" placeholder="8 or 11 characters"></div>
                    <div><label>Account/IBAN</label><input type="text" placeholder="Your account number"></div>
                </div>
            </div>

            <div id="form-card" class="dynamic-form">
                <label>Cardholder Name</label>
                <input type="text" placeholder="Name as it appears on card" style="margin-bottom:15px;">
                <label>Card Number</label>
                <input type="text" placeholder="XXXX XXXX XXXX XXXX">
            </div>

            <div id="form-gpay" class="dynamic-form">
                <label>Google Account Email</label>
                <input type="email" placeholder="your-email@gmail.com">
            </div>

            <button class="btn-submit">Confirm Withdrawal</button>
            <p style="text-align:center; font-size:10px; color:var(--text-dim); margin-top:20px;">
                Please double-check your details. Withdrawals take 1-24 hours to process.
            </p>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // Function to switch between payment methods
        function setGate(id, el) {
            // Remove active style from all buttons
            document.querySelectorAll('.gate-btn').forEach(btn => btn.classList.remove('active'));
            // Hide all detail forms
            document.querySelectorAll('.dynamic-form').forEach(form => form.style.display = 'none');
            
            // Activate clicked button and show its form
            el.classList.add('active');
            document.getElementById('form-' + id).style.display = 'block';
        }
    </script>
</body>
</html>
