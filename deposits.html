<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Gateway | INGRO</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --bg: #030303; --panel: #0a0a0a; --gold: #c5a059;
            --border: rgba(255, 255, 255, 0.05); --text-dim: #666;
            --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; min-height: 100vh; font-size: 13px; }

        /* --- NAVIGATION --- */
        .sidebar { width: var(--sidebar-w); background: #000; border-right: 1px solid var(--border); padding: 30px; position: fixed; height: 100vh; z-index: 100; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px; color: var(--text-dim); text-decoration: none; transition: 0.3s; margin-bottom: 5px; border-radius: 4px; }
        .nav-item.active { color: var(--gold); background: rgba(197, 160, 89, 0.08); }

        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid var(--border); padding: 12px 0; z-index: 1000; justify-content: space-around; }
        .mobile-nav a { color: var(--text-dim); text-decoration: none; font-size: 22px; }
        .mobile-nav a.active { color: var(--gold); }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 60px; width: 100%; max-width: 1100px; margin-right: auto; }
        .page-header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .page-header h1 { font-weight: 200; font-size: 2.2rem; letter-spacing: -1px; }

        .section-label { font-size: 10px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; display: block; }

        /* --- DEPOSIT CONTAINER --- */
        .deposit-card { background: var(--panel); border: 1px solid var(--border); padding: 40px; border-radius: 4px; }
        
        .input-group { margin-bottom: 30px; }
        .input-group label { display: block; font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
        
        input, select { 
            width: 100%; background: #000; border: 1px solid var(--border); padding: 16px; 
            color: #fff; font-size: 14px; outline: none; border-radius: 4px; transition: 0.3s; 
        }
        input:focus { border-color: var(--gold); }

        /* --- GATEWAY SELECTOR --- */
        .gateway-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .gate-btn { 
            background: #000; border: 1px solid var(--border); padding: 20px 10px; text-align: center; 
            cursor: pointer; transition: 0.3s; border-radius: 4px;
        }
        .gate-btn.active { border-color: var(--gold); background: rgba(197, 160, 89, 0.05); }
        .gate-btn i { font-size: 1.5rem; display: block; margin-bottom: 8px; color: var(--text-dim); }
        .gate-btn.active i { color: var(--gold); }
        .gate-btn span { font-size: 10px; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }

        /* --- DYNAMIC FORM AREAS --- */
        .dynamic-form { 
            background: #050505; border: 1px dashed var(--border); padding: 25px; 
            border-radius: 4px; margin-bottom: 30px; display: none; 
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        .btn-submit { 
            width: 100%; background: var(--gold); color: #000; padding: 20px; 
            border: none; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; cursor: pointer; border-radius: 4px; 
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .main-content { margin-left: 0; padding: 30px 20px 100px 20px; }
            .gateway-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 480px) {
            .form-row { grid-template-columns: 1fr; }
            .gateway-grid { grid-template-columns: 1fr; }
            .deposit-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="margin-bottom: 50px; color: var(--gold); letter-spacing: 5px; font-size: 10px; text-align: center;">INVESTCORE</div>
        <nav>
            <a href="dashboard.html" class="nav-item"><i class="ph ph-chart-line-up"></i> Dashboard</a>
            <a href="#" class="nav-item active"><i class="ph ph-wallet"></i> Fund Wallet</a>
            <a href="deposit.html" class="nav-item"><i class="ph ph-bank"></i> Invest</a>
        </nav>
    </aside>

    <nav class="mobile-nav">
        <a href="#"><i class="ph ph-chart-line-up"></i></a>
        <a href="#" class="active"><i class="ph ph-wallet"></i></a>
        <a href="#"><i class="ph ph-bank"></i></a>
    </nav>

    <main class="main-content">
        <header class="page-header" data-aos="fade-down">
            <h1>Capital <b>Inflow</b></h1>
            <p style="color:var(--text-dim)">Initialize a secure transfer to your wallet balance.</p>
        </header>

        <div class="deposit-card" data-aos="fade-up">
            <div class="input-group">
                <label>Deposit Amount (USD)</label>
                <input type="number" id="main-amount" placeholder="500.00">
            </div>

            <label class="section-label">Select Gateway</label>
            <div class="gateway-grid">
                <div class="gate-btn active" onclick="setGate('paypal', this)"><i class="ph ph-paypal-logo"></i><span>PayPal</span></div>
                <div class="gate-btn" onclick="setGate('momo', this)"><i class="ph ph-device-mobile"></i><span>Mobile Money</span></div>
                <div class="gate-btn" onclick="setGate('crypto', this)"><i class="ph ph-currency-btc"></i><span>Crypto</span></div>
                <div class="gate-btn" onclick="setGate('wire', this)"><i class="ph ph-bank"></i><span>Bank Wire</span></div>
                <div class="gate-btn" onclick="setGate('card', this)"><i class="ph ph-credit-card"></i><span>Debit/Credit</span></div>
                <div class="gate-btn" onclick="setGate('gpay', this)"><i class="ph ph-google-logo"></i><span>G-Pay</span></div>
            </div>

            <div id="form-paypal" class="dynamic-form" style="display:block;">
                <label class="section-label">PayPal Credentials</label>
                <input type="email" placeholder="Your PayPal Email Address">
            </div>

            <div id="form-momo" class="dynamic-form">
                <label class="section-label">Carrier Information</label>
                <select style="margin-bottom:15px;">
                    <option>MTN Mobile Money</option>
                    <option>Orange Money</option>
                    <option>Airtel Money</option>
                </select>
                <div class="form-row">
                    <input type="text" placeholder="Phone (+237...)">
                    <input type="text" placeholder="Full Account Name">
                </div>
            </div>

            <div id="form-crypto" class="dynamic-form">
                <label class="section-label">Asset Selection</label>
                <select id="coin-select" style="margin-bottom:15px;">
                    <option value="btc">Bitcoin (BTC)</option>
                    <option value="usdt">USDT (TRC-20)</option>
                    <option value="eth">Ethereum (ERC-20)</option>
                </select>
                <label>Receiver Address</label>
                <div style="background:#111; padding:12px; font-family:monospace; color:var(--gold); font-size:11px; border:1px solid var(--border);">
                    bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh
                </div>
            </div>

            <div id="form-wire" class="dynamic-form">
                <label class="section-label">Your Bank Details (For Verification)</label>
                <input type="text" placeholder="Bank Name" style="margin-bottom:15px;">
                <div class="form-row">
                    <input type="text" placeholder="SWIFT / BIC">
                    <input type="text" placeholder="IBAN / Account No.">
                </div>
            </div>

            <div id="form-card" class="dynamic-form">
                <label class="section-label">Secure Card Entry</label>
                <input type="text" placeholder="Cardholder Name" style="margin-bottom:15px;">
                <input type="text" placeholder="16-Digit Card Number" style="margin-bottom:15px;">
                <div class="form-row">
                    <input type="text" placeholder="MM/YY">
                    <input type="text" placeholder="CVV">
                </div>
            </div>

            <div id="form-gpay" class="dynamic-form">
                <label class="section-label">Google Account</label>
                <input type="email" placeholder="Connected Gmail Address">
            </div>

            <button class="btn-submit">Confirm Transaction</button>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        function setGate(id, el) {
            document.querySelectorAll('.gate-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.dynamic-form').forEach(f => f.style.display = 'none');
            el.classList.add('active');
            document.getElementById('form-' + id).style.display = 'block';
        }
    </script>
</body>
</html>
